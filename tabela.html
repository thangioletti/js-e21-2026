<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula JS - Tabela</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
    <header class="border-b border-slate-200 bg-white">
        <div class="mx-auto flex max-w-7xl flex-col gap-4 px-5 py-5 sm:flex-row sm:items-center sm:justify-between">
            <div>
                <p class="text-sm font-semibold uppercase tracking-wider text-teal-700">Aula de JavaScript</p>
                <h1 class="mt-1 text-2xl font-bold text-slate-950">Tabela para popular com dados</h1>
            </div>

            <nav class="flex gap-2">
                <a href="index.html" class="rounded-md border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-50">Kanban</a>
                <a href="tabela.html" class="rounded-md bg-slate-950 px-4 py-2 text-sm font-semibold text-white">Tabela</a>
            </nav>
        </div>
    </header>

    <main class="mx-auto max-w-7xl px-5 py-8">
        <section class="mb-6 grid gap-4 md:grid-cols-4">
            <div class="rounded-lg border border-slate-200 bg-white p-5">
                <p class="text-sm font-medium text-slate-500">Clientes</p>
                <p class="mt-2 text-3xl font-bold">8</p>
            </div>
            <div class="rounded-lg border border-slate-200 bg-white p-5">
                <p class="text-sm font-medium text-slate-500">Pedidos pagos</p>
                <p class="mt-2 text-3xl font-bold">5</p>
            </div>
            <div class="rounded-lg border border-slate-200 bg-white p-5">
                <p class="text-sm font-medium text-slate-500">Pendentes</p>
                <p class="mt-2 text-3xl font-bold">2</p>
            </div>
            <div class="rounded-lg border border-slate-200 bg-white p-5">
                <p class="text-sm font-medium text-slate-500">Total vendido</p>
                <p class="mt-2 text-3xl font-bold">R$ 4.870</p>
            </div>
        </section>

        <section class="overflow-hidden rounded-lg border border-slate-200 bg-white">
            <div class="flex flex-col gap-3 border-b border-slate-200 px-5 py-4 md:flex-row md:items-center md:justify-between">
                <div>
                    <h2 class="text-lg font-bold text-slate-950">Pedidos recentes</h2>
                    <p class="text-sm text-slate-500">Linhas fixas para depois criar com JavaScript.</p>
                </div>

                <div class="flex gap-2">
                    <span class="rounded-full bg-emerald-100 px-3 py-1 text-xs font-bold text-emerald-800">Pago</span>
                    <span class="rounded-full bg-amber-100 px-3 py-1 text-xs font-bold text-amber-800">Pendente</span>
                    <span class="rounded-full bg-rose-100 px-3 py-1 text-xs font-bold text-rose-800">Cancelado</span>
                    <button class="rounded-full bg-gray-100 px-3 py-1 text-xs font-bold text-gray-800" id="add">ADD Linha</button>

                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full min-w-[760px] border-collapse text-left">
                    <thead class="bg-slate-50 text-sm text-slate-600">
                        <tr>
                            <th class="px-5 py-3 font-bold">Pedido</th>
                            <th class="px-5 py-3 font-bold">Cliente</th>
                            <th class="px-5 py-3 font-bold">Produto</th>
                            <th class="px-5 py-3 font-bold">Valor</th>
                            <th class="px-5 py-3 font-bold">Status</th>
                            <th class="px-5 py-3 font-bold">Data</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-200 text-sm" id="tabela">                        
                    </tbody>
                </table>
            </div>
        </section>
    </main>
    <script src="tabela.js"></script>
</body>
</html>
